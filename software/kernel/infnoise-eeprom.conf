# FTDI EEPROM configuration for Infinite Noise TRNG
#
# This configuration reprograms the FT240X chip to use the
# registered Infinite Noise VID/PID instead of the default FTDI IDs.
#
# Usage:
#   sudo ftdi_eeprom --flash-eeprom infnoise.conf
#
# Then unplug and replug the device.

vendor_id=0x1209
product_id=0x3701

manufacturer="leetronics"
product="Infinite Noise TRNG"

# Power configuration
self_powered=false
remote_wakeup=false
max_power=100

# FT240X specific settings
use_serial=false
